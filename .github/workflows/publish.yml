name: Publish to PyPI

# Runs when you publish a GitHub Release. Builds the package and uploads it to
# PyPI using Trusted Publishing (OIDC) -- no API token is stored anywhere.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
      contents: write   # to attach the built files to the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Attach build artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
